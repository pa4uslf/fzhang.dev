{{ define "main" }}
  <article class="pa3 pa4-ns mw8 center">
    <section class="measure-wide lh-copy nested-links {{ $.Param "text_color" | compare.Default "mid-gray" }}">
      {{- .Content -}}
    </section>

    <section class="mt5" aria-labelledby="terms-title">
      <div class="home-section-heading mb4">
        <div>
          <p class="home-kicker">Topics</p>
          <h2 id="terms-title" class="f1-l f2 mv1 near-black">{{ .Title }}</h2>
        </div>
        <p class="mid-gray mv2">共 {{ len .Data.Pages }} 个主题</p>
      </div>

      <div class="taxonomy-grid taxonomy-grid--topics">
        {{ range .Data.Pages.ByTitle }}
          <a href="{{ .RelPermalink }}" class="taxonomy-card link dark-gray dim">
            <span class="db f3 fw6 athelas">{{ .LinkTitle }}</span>
            {{ with .Params.description }}
              <span class="db f6 mid-gray mt3 lh-copy">{{ . }}</span>
            {{ else }}
              <span class="db f6 mid-gray mt3">{{ .Pages.Len }} 篇文章</span>
            {{ end }}
            <span class="summary-link link dim fw6 mt3 dib">进入专题 →</span>
          </a>
        {{ end }}
      </div>
    </section>
  </article>
{{ end }}
