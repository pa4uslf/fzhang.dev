<div class="w-100 mb4 nested-copy-line-height relative bg-white">
  <div class="mb3 pa4 gray overflow-hidden bg-white home-post-card">
    {{ with .CurrentSection.Title }}<span class="f6 db">{{ . }}</span>{{ end }}
    <p class="f6 tracked mid-gray mv0">{{ .Date | time.Format (compare.Default "2006-01-02" .Site.Params.date_format) }}</p>
    <h3 class="f3 near-black mt2">
      <a href="{{ .RelPermalink }}" class="link black dim">{{ .Title }}</a>
    </h3>
    <div class="nested-links f5 lh-copy nested-copy-line-height">
      {{ with .Description }}
        <p>{{ . }}</p>
      {{ else }}
        {{ .Summary }}
      {{ end }}
    </div>
    <a href="{{ .RelPermalink }}" class="ba b--moon-gray bg-light-gray br2 color-inherit dib f7 hover-bg-moon-gray link mt2 ph2 pv1">
      {{ $.Param "read_more_copy" | compare.Default (lang.Translate "readMore") }}
    </a>
  </div>
</div>
