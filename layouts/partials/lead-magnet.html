<aside class="lead-magnet-box" aria-labelledby="contact-card-title">
  <h2 id="contact-card-title" class="f3 mv0">{{ .title | default "联系方式" }}</h2>
  <p class="lead-magnet-copy">{{ .description | default "欢迎直接联系我。" }}</p>

  <div class="contact-info">
    <div class="contact-meta">
      {{ with .email }}
        <p><strong>邮箱：</strong><a href="mailto:{{ . }}">{{ . }}</a></p>
      {{ end }}
      <p><strong>微信：</strong>扫码添加</p>
    </div>

    {{ with .qrcode }}
      <figure class="contact-qrcode">
        <img src="{{ . | relURL }}" alt="Frank Zhang 的微信二维码">
      </figure>
    {{ end }}
  </div>
</aside>
